version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: siadprep-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: siadprep
      POSTGRES_PASSWORD: siadprep_dev
      POSTGRES_DB: siadprep
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U siadprep']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: siadprep-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@siadprep.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
